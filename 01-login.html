<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avalis — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     Tokens reais extraídos de src/styles/theme.css e theme/preset.ts
     ============================================================ */
  :root {
    --avalis-blue-primary: #2F80ED;
    --avalis-blue-navy: #0B2A4A;
    --avalis-blue-medical: #1E5FBF;
    --avalis-blue-light: #4FA3FF;
    --avalis-ice-primary: #E9F1F7;
    --avalis-ice-white: #F8FBFE;

    --app-font-family: Inter, "Segoe UI", Helvetica, Arial, sans-serif;

    --auth-page-bg:
      linear-gradient(180deg, rgba(11, 42, 74, 0.04), transparent 30%),
      linear-gradient(135deg, #f8fbfe 0%, #eef5fb 52%, #E9F1F7 100%);
    --auth-page-grid: rgba(11, 42, 74, 0.05);
    --auth-panel-bg: rgba(248, 251, 254, 0.92);
    --auth-panel-border: rgba(11, 42, 74, 0.12);
    --auth-panel-shadow: 0 24px 60px rgba(11, 42, 74, 0.1);
    --auth-title-color: #0B2A4A;
    --auth-muted-color: #536f8b;
    --auth-field-bg: rgba(248, 251, 254, 0.94);
    --auth-field-border: rgba(11, 42, 74, 0.18);
    --auth-field-border-strong: rgba(30, 95, 191, 0.34);
    --auth-focus-ring: rgba(47, 128, 237, 0.16);
    --auth-danger-bg: #fff1f0;
    --auth-danger-border: rgba(184, 73, 73, 0.18);
    --auth-danger-color: #a04545;
    --auth-success-bg: #edf6ff;
    --auth-success-border: rgba(47, 128, 237, 0.18);
    --auth-success-text: #1E5FBF;
    --auth-logo-shadow: 0 18px 40px rgba(11, 42, 74, 0.16);
    --primary-color: #2F80ED;
    --primary-inverse: #E9F1F7;
    --transition-theme: background-color .25s ease, color .25s ease, border-color .25s ease;
  }

  html.app-dark {
    --auth-page-bg:
      linear-gradient(180deg, rgba(79, 163, 255, 0.16), transparent 34%),
      linear-gradient(135deg, #04101d 0%, #071728 45%, #0B2A4A 100%);
    --auth-page-grid: rgba(233, 241, 247, 0.08);
    --auth-panel-bg: rgba(7, 23, 40, 0.84);
    --auth-panel-border: rgba(79, 163, 255, 0.18);
    --auth-panel-shadow: 0 24px 64px rgba(2, 6, 23, 0.54);
    --auth-title-color: #E9F1F7;
    --auth-muted-color: #bfd4e8;
    --auth-field-bg: rgba(11, 42, 74, 0.58);
    --auth-field-border: rgba(79, 163, 255, 0.18);
    --auth-field-border-strong: rgba(79, 163, 255, 0.32);
    --auth-focus-ring: rgba(79, 163, 255, 0.2);
    --auth-danger-bg: rgba(160, 69, 69, 0.18);
    --auth-danger-border: rgba(255, 180, 180, 0.22);
    --auth-danger-color: #ffd6d3;
    --auth-success-bg: rgba(47, 128, 237, 0.14);
    --auth-success-border: rgba(79, 163, 255, 0.28);
    --auth-success-text: #aac2dc;
    --auth-logo-shadow: 0 20px 48px rgba(2, 6, 23, 0.46);
    --primary-inverse: #071728;
  }

  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0;
    font-family: var(--app-font-family);
    color: var(--auth-title-color);
    transition: var(--transition-theme);
  }

  /* Faixa de demonstração */
  .demo-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--avalis-blue-navy);
    color: var(--avalis-ice-white);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    padding: 6px 12px;
    font-weight: 600;
  }
  html.app-dark .demo-banner { background: #04101d; }

  /* Shell de autenticação (réplica de .auth-shell) */
  .auth-shell {
    min-height: 100vh;
    padding: 56px 20px 24px;
    overflow-x: clip;
    background-color: var(--auth-field-bg);
    background-image:
      linear-gradient(var(--auth-page-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--auth-page-grid) 1px, transparent 1px),
      var(--auth-page-bg);
    background-size: 32px 32px, 32px 32px, auto;
  }

  .auth-shell__frame {
    width: min(100%, 1100px);
    min-height: calc(100vh - 80px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    gap: 24px;
  }

  .auth-shell__actions { display: flex; justify-content: flex-end; }

  .theme-toggle-button {
    border-radius: 999px;
    border: 1px solid var(--auth-panel-border);
    background: rgba(255, 255, 255, 0.66);
    color: var(--auth-title-color);
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    backdrop-filter: blur(16px);
    padding: 10px 16px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition-theme);
  }
  html.app-dark .theme-toggle-button {
    background: rgba(15, 23, 42, 0.72);
    box-shadow: 0 12px 28px rgba(2, 6, 23, 0.28);
  }

  .auth-panel {
    width: min(100%, 520px);
    margin: 0 auto;
    padding: 36px;
    border-radius: 28px;
    background: var(--auth-panel-bg);
    border: 1px solid var(--auth-panel-border);
    box-shadow: var(--auth-panel-shadow);
    backdrop-filter: blur(20px);
  }

  .auth-panel__brand { display: flex; justify-content: center; margin-bottom: 20px; }

  /* Logo Avalis em SVG (sem depender de asset externo) */
  .auth-brand__logo {
    width: min(100%, 200px);
    filter: drop-shadow(var(--auth-logo-shadow));
  }

  .auth-panel__header { display: grid; gap: 10px; text-align: center; }
  .auth-panel__eyebrow {
    margin: 0;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--primary-color);
  }
  .auth-panel__title {
    margin: 0;
    font-size: clamp(1.9rem, 4vw, 2.5rem);
    line-height: 1.05;
    color: var(--auth-title-color);
  }
  .auth-panel__description {
    max-width: 32ch;
    margin: 0 auto;
    font-size: 0.98rem;
    line-height: 1.6;
    color: var(--auth-muted-color);
  }

  .auth-panel__body { margin-top: 28px; }
  .auth-form { display: grid; gap: 18px; }

  .auth-feedback {
    border-radius: 18px;
    padding: 14px 16px;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .auth-feedback--error {
    background: var(--auth-danger-bg);
    border: 1px solid var(--auth-danger-border);
    color: var(--auth-danger-color);
  }
  .auth-feedback--success {
    background: var(--auth-success-bg);
    border: 1px solid var(--auth-success-border);
    color: var(--auth-success-text);
  }

  .auth-field { display: grid; gap: 8px; min-width: 0; }
  .auth-field__label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .auth-field__label { font-size: 0.95rem; font-weight: 600; color: var(--auth-title-color); }
  .auth-field__hint { font-size: 0.82rem; color: var(--auth-muted-color); }

  .auth-input {
    width: 100%;
    min-height: 52px;
    border-radius: 16px;
    background: var(--auth-field-bg);
    border: 1px solid var(--auth-field-border);
    color: var(--auth-title-color);
    padding: 0 16px;
    font-family: inherit;
    font-size: 1rem;
    transition: var(--transition-theme), box-shadow 0.2s ease;
  }
  .auth-input::placeholder { color: var(--auth-muted-color); }
  .auth-input:hover { border-color: var(--auth-field-border-strong); }
  .auth-input:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 4px var(--auth-focus-ring);
    outline: none;
  }

  .auth-password-wrap { position: relative; }
  .auth-password-wrap .auth-input { padding-right: 3rem; }
  .auth-password-toggle {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--auth-muted-color);
    padding: 4px;
    display: inline-flex;
  }

  .auth-form__actions { margin-top: 6px; }
  .auth-form__submit {
    width: 100%;
    min-height: 52px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid var(--avalis-blue-primary);
    background: var(--avalis-blue-primary);
    color: var(--avalis-ice-white);
    box-shadow: 0 14px 32px rgba(2, 132, 199, 0.2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: var(--transition-theme), transform .2s ease, box-shadow .2s ease;
  }
  .auth-form__submit:hover {
    background: var(--avalis-blue-medical);
    border-color: var(--avalis-blue-medical);
    transform: translateY(-1px);
    box-shadow: 0 18px 36px rgba(2, 132, 199, 0.24);
  }
  .auth-form__submit:disabled { opacity: 0.7; cursor: default; transform: none; }

  .auth-form__support {
    margin: 16px 0 0;
    text-align: center;
    font-size: 0.93rem;
    line-height: 1.5;
    color: var(--auth-muted-color);
  }
  .auth-form__support a { color: var(--primary-color); font-weight: 700; text-decoration: none; }
  .auth-form__support a:hover { text-decoration: underline; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .auth-panel { padding: 22px 18px; border-radius: 24px; }
    .auth-panel__title { font-size: 1.75rem; }
  }
</style>
</head>
<body>
  <div class="demo-banner">Tela de demonstração · dados fictícios</div>

  <div class="auth-shell">
    <div class="auth-shell__frame">
      <div class="auth-shell__actions">
        <button class="theme-toggle-button" id="themeToggle" type="button" aria-label="Alternar tema">
          <span id="themeIcon">
            <!-- ícone lua -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
          <span id="themeLabel">Tema escuro</span>
        </button>
      </div>

      <div class="auth-panel">
        <div class="auth-panel__brand">
          <!-- Logomarca Avalis reproduzida em SVG -->
          <svg class="auth-brand__logo" viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Avalis">
            <defs>
              <linearGradient id="avMark" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#4FA3FF"/>
                <stop offset="1" stop-color="#1E5FBF"/>
              </linearGradient>
            </defs>
            <!-- símbolo: "A" estilizado / batimento -->
            <path d="M8 44 L24 14 L40 44 L33 44 L24 27 L15 44 Z" fill="url(#avMark)"/>
            <path d="M4 38 L14 38 L18 30 L23 46 L28 24 L32 38 L52 38" fill="none" stroke="#2F80ED" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
            <text x="62" y="42" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="currentColor" letter-spacing="0.5">Avalis</text>
          </svg>
        </div>

        <div class="auth-panel__header">
          <p class="auth-panel__eyebrow">Avalis</p>
          <h1 class="auth-panel__title">Acesse sua conta</h1>
          <p class="auth-panel__description">Entre com suas credenciais para acessar o ambiente Avalis.</p>
        </div>

        <div class="auth-panel__body">
          <form class="auth-form" id="loginForm" novalidate>
            <div class="auth-feedback auth-feedback--error" id="generalError" role="alert" style="display:none"></div>
            <div class="auth-feedback auth-feedback--success" id="generalSuccess" role="status" style="display:none"></div>

            <div class="auth-field">
              <div class="auth-field__label-row">
                <label class="auth-field__label" for="email">E-mail</label>
                <span class="auth-field__hint">Obrigatório</span>
              </div>
              <input class="auth-input" id="email" type="email" inputmode="email" autocomplete="email"
                     placeholder="voce@empresa.com" value="medico@avalis.com.br" />
            </div>

            <div class="auth-field">
              <div class="auth-field__label-row">
                <label class="auth-field__label" for="password">Senha</label>
                <span class="auth-field__hint">Obrigatório</span>
              </div>
              <div class="auth-password-wrap">
                <input class="auth-input" id="password" type="password" autocomplete="current-password"
                       placeholder="Sua senha" value="demo1234" />
                <button class="auth-password-toggle" id="pwToggle" type="button" aria-label="Mostrar senha">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>

            <div class="auth-form__actions">
              <button class="auth-form__submit" id="submitBtn" type="submit">
                <span id="submitLabel">Entrar</span>
                <svg id="submitArrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
            </div>
          </form>

          <p class="auth-form__support">
            Não tem uma conta?
            <a href="02-cadastro.html">Cadastre-se</a>
          </p>
        </div>
      </div>
    </div>
  </div>

<script>
  // ---- Alternância de tema (réplica do comportamento anti-FOUC do projeto) ----
  (function () {
    var root = document.documentElement;
    var saved = localStorage.getItem('avalis-demo-theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) root.classList.add('app-dark');
    updateToggle();
  })();

  function updateToggle() {
    var isDark = document.documentElement.classList.contains('app-dark');
    document.getElementById('themeLabel').textContent = isDark ? 'Tema claro' : 'Tema escuro';
    document.getElementById('themeIcon').innerHTML = isDark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }

  document.getElementById('themeToggle').addEventListener('click', function () {
    document.documentElement.classList.toggle('app-dark');
    localStorage.setItem('avalis-demo-theme',
      document.documentElement.classList.contains('app-dark') ? 'dark' : 'light');
    updateToggle();
  });

  // ---- Mostrar/ocultar senha ----
  document.getElementById('pwToggle').addEventListener('click', function () {
    var input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  });

  // ---- Submit simulando chamada ao backend com sucesso ----
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var err = document.getElementById('generalError');
    var ok = document.getElementById('generalSuccess');
    err.style.display = 'none';
    ok.style.display = 'none';

    var email = document.getElementById('email').value.trim();
    var pass = document.getElementById('password').value;

    if (!email || !pass) {
      err.textContent = !email ? 'Informe o e-mail' : 'Informe a senha';
      err.style.display = 'block';
      return;
    }

    var btn = document.getElementById('submitBtn');
    var label = document.getElementById('submitLabel');
    var arrow = document.getElementById('submitArrow');
    btn.disabled = true;
    label.textContent = 'Entrando...';
    arrow.outerHTML = '<span class="spinner" id="submitArrow"></span>';

    // Simula latência de rede + resposta 200 do backend
    setTimeout(function () {
      ok.textContent = 'Login realizado com sucesso. Redirecionando...';
      ok.style.display = 'block';
      setTimeout(function () {
        // Na demo, login leva ao dashboard do médico (perfil padrão do e-mail mock)
        window.location.href = '03-dashboard-medico.html';
      }, 900);
    }, 1100);
  });
</script>
</body>
</html>
